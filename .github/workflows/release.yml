name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: zone-tools-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: zone-tools-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: zone-tools-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: zone-tools-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev libgl1-mesa-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/zone2json build/json2zone build/zone_editor dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp build/zone2json build/json2zone dist/
          APP=dist/ZoneEditor.app
          mkdir -p "$APP/Contents/MacOS"
          cp build/zone_editor "$APP/Contents/MacOS/zone_editor"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>zone_editor</string>
            <key>CFBundleName</key><string>LU Zone Editor</string>
            <key>CFBundleIdentifier</key><string>com.lu-rebuilt.zone-editor</string>
            <key>CFBundleVersion</key><string>1.0</string>
          </dict>
          </plist>
          PLIST
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip zone2json json2zone ZoneEditor.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/*.exe dist/ 2>/dev/null || true
          for exe in dist/*.exe; do windeployqt "$exe" 2>/dev/null || true; done
          7z a ${{ matrix.artifact }}.zip ./dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
