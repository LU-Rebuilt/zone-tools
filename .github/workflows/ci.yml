name: CI

on:
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR commits
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: $msg"
              FAILED=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: zone-tools-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: zone-tools-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: zone-tools-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev qt6-base-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3 qt@6

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/zone2json build/json2zone build/zone_editor dist/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/*.exe dist/ 2>/dev/null || true
          7z a ${{ matrix.artifact }}.zip ./dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
